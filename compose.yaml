services:
  kisna_chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kisna-chatbot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENV_MODE: dev
      MONGO_URI: mongodb://admin:admin@mongodb:27017/?authSource=admin
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - kisna-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ping')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  mongodb:
    image: mongo:7.0
    container_name: kisna-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
    networks:
      - kisna-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  mongodb_data:

networks:
  kisna-network:
    driver: bridge
